services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: autogent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: autogent
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal

  app:
    build: .
    restart: always
    depends_on:
      - db
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - internal

networks:
  internal:

volumes:
  db_data:

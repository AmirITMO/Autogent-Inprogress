services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: autogent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: autogent
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal

  app:
    build: .
    restart: always
    depends_on:
      - db
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - internal
      - n8n_default

  bot:
    build: ./autogent-crm-telegram-bot
    restart: always
    depends_on:
      - app
    env_file:
      - .env.production
    networks:
      - internal

networks:
  internal:
  n8n_default:
    external: true

volumes:
  db_data:
  uploads_data:
